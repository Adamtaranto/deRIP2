site_name: deRIP2
site_description: Predict ancestral fungal transposon sequences by correcting for RIP-like mutations
site_author: adamtaranto
repo_name: adamtaranto/deRIP2
repo_url: https://github.com/adamtaranto/deRIP2
edit_uri: ""
use_directory_urls: true
nav:
  - Getting Started: index.md
  - Colab demo notebook: tutorial.ipynb
  - RIP Strand Bias: tutorials/rip-strand-bias.md
  - RIP Masking & Phylogeny: tutorials/rip-masking-phylogeny.md
  - Mutation Spectra: tutorials/mutation-spectra.md
  - Flank-context Spectra (API): tutorials/flank-context-spectra.md
  - Per-sequence Reporting: tutorials/per-sequence-reporting.md
  - API Docs: api-docs/deRIP_API.md
  - CLI Docs: cli-docs/deRIP_cmd_line.md
theme:
  name: material # material, readthedocs, mkdocs
  features:
    - navigation.top
    - navigation.expand
    # - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
plugins:
  - search
  - mkdocs-jupyter:
      execute: False
      include: ["*.ipynb"]
  - mkdocstrings:
      handlers:
        python:
          # Reference: https://mkdocstrings.github.io/python/usage/
          options:
            # Heading options
            heading_level: 2
            show_root_full_path: False
            show_root_heading: True
            # Member options
            members_order: source # alphabetical, source
            # Docstrings options
            docstring_style: numpy
            docstring_section_style: spacy # table, list, spacy
            line_length: 89
            merge_init_into_class: True
            # Signatures/annotations options
            show_signature_annotations: True
            separate_signature: True
            # Additional options
            show_source: False
